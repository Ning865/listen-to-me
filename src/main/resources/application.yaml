spring:
  application:
    name: listen-to-me

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/listen-to-me
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.github.listen-to-me.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: warn
    com.example.rednote: debug
  pattern:
    console: "-----------------%n%d{HH:mm:ss} | %highlight(%-4level) | %-15.15thread | %logger.%M |%n%msg%n-----------------%n"
