spring:
  application:
    name: listen-to-me
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 2000MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
  amqp:
    deserialization:
      trust-all: true
  rabbitmq:
    host: localhost # 你的MQ地址
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    simple:
      acknowledge-mode: auto # 自动确认消息
      retry:
        enabled: true # 消费失败重试
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/listen-to-me?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.github.listen-to-me.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-not-delete-value: 0
      logic-delete-value: 1
logging:
  level:
    root: warn
    com.github.listen_to_me: debug
  pattern:
    console: "%d{HH:mm:ss} | %highlight(%-5level) | %-15.15thread | %logger.%M |%n%msg%n---------------------------------%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
    # NOTE: 不关闭这个功能在注册全局异常处理器时会报 NoSuchMethodError
  override-with-generic-response: false
  group-configs:
    - group: "公共接口"
      paths-to-match: "/api/common/**"
      packages-to-scan: com.github.listen_to_me.controller.common
    - group: "用户相关接口"
      paths-to-match: "/api/user/**"
      packages-to-scan: com.github.listen_to_me.controller.user
    - group: "创作者相关接口"
      paths-to-match: "/api/creator/**"
      packages-to-scan: com.github.listen_to_me.controller.creator
    - group: "管理员相关接口"
      paths-to-match: "/api/admin/**"
      packages-to-scan: com.github.listen_to_me.controller.admin

knife4j:
  enable: true
  production: false
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
    swagger-model-name: 数据模型定义

jwt:
  secret: your-secure-32-character-secret-key-here
  expiration: 86400000 # 24 小时

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET}
  expiration: 24 # 默认临时 URL 过期时间 (头像+封面, 24小时)
  raw-expiration: 1 # 原始文件临时 URL 过期时间 (1 小时)
  clip-expiration: 15 # 剪辑文件临时 URL 过期时间 (15 分钟)

alipay:
  appId: ${ALIPAY_APP_ID}
  privateKey: ${ALIPAY_PRIVATE_KEY}
  publicKey: ${ALIPAY_PUBLIC_KEY}
  # 开发需使用 ngrok 进行内网击穿，格式如下：https://{xxxx}.ngrok-free.app/api/user/callback/alipay
  notifyUrl: ${ALIPAY_NOTIFY_URL}
  gatewayUrl: https://openapi-sandbox.dl.alipaydev.com/gateway.do
